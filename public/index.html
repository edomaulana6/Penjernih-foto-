<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Photo Upscaler 32MP - Super Jernih</title>
    <style>
        :root { --primary: #2563eb; --success: #059669; --bg: #f8fafc; --danger: #dc2626; }
        body { font-family: 'Inter', system-ui, sans-serif; text-align: center; padding: 20px; background-color: var(--bg); color: #1e293b; }
        .container { background: white; padding: 40px; border-radius: 16px; display: inline-block; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 500px; width: 100%; }
        h2 { margin-top: 0; color: var(--primary); }
        .info { font-size: 0.9rem; color: #64748b; margin-bottom: 20px; }
        input[type="file"] { margin: 20px 0; padding: 10px; border: 2px dashed #cbd5e1; border-radius: 8px; width: 100%; cursor: pointer; }
        
        .btn { background-color: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; width: 100%; margin-bottom: 10px; }
        .btn-cancel { background-color: var(--danger); display: none; }
        .btn:hover { opacity: 0.9; }
        
        /* Face Enhance Toggle */
        .option-box { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 20px; font-size: 0.9rem; font-weight: 600; }

        /* Comparison Slider */
        .comparison-view { display: none; position: relative; width: 100%; height: 350px; overflow: hidden; border-radius: 12px; margin-top: 20px; border: 1px solid #e2e8f0; }
        .comp-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; background: #eee; }
        .img-after { clip-path: inset(0 0 0 50%); }
        .slider-line { position: absolute; top: 0; bottom: 0; width: 3px; background: white; left: 50%; cursor: ew-resize; z-index: 10; box-shadow: 0 0 10px rgba(0,0,0,0.5); }

        .loading-section { display: none; margin-top: 25px; }
        .spinner { border: 4px solid rgba(0,0,0,0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: var(--primary); animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { font-weight: 500; color: #475569; margin-bottom: 5px; }
        #sub-status { font-size: 0.85rem; color: #94a3b8; }
        #resultSection { display: none; margin-top: 30px; padding-top: 20px; border-top: 1px solid #e2e8f0; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Upscaler 32MP</h2>
        <p class="info">Denoise + Lanczos3 + Sharpening<br>Maksimal 3 foto (Max 25MB/foto)</p>
        
        <input type="file" id="photoInput" accept="image/*" multiple onchange="previewBefore()">

        <div class="option-box">
            <input type="checkbox" id="faceEnhance"> ✨ Penjernih Wajah (Ala Remini)
        </div>
        
        <button id="btnProcess" class="btn" onclick="startProcessing()">Jernihkan Sekarang</button>
        <button id="btnCancel" class="btn btn-cancel" onclick="cancelProcessing()">Batal Proses</button>

        <div id="comparisonView" class="comparison-view" onmousemove="handleSlider(event)" ontouchmove="handleSlider(event)">
            <img id="viewBefore" class="comp-img">
            <img id="viewAfter" class="comp-img img-after">
            <div id="sliderLine" class="slider-line"></div>
        </div>

        <div id="loadingSection" class="loading-section">
            <div class="spinner"></div>
            <div id="status">Memulai...</div>
            <div id="sub-status">Jangan tutup halaman ini.</div>
        </div>

        <div id="resultSection">
            <p style="color: var(--success); font-weight: bold;">✓ Berhasil!</p>
            <a id="downloadLink" href="#" class="btn" style="background-color: var(--success); text-decoration: none;">DOWNLOAD HASIL (.ZIP)</a>
        </div>
    </div>

    <script>
        let abortController;

        function previewBefore() {
            const file = document.getElementById('photoInput').files[0];
            if (file) {
                document.getElementById('viewBefore').src = URL.createObjectURL(file);
                document.getElementById('comparisonView').style.display = 'block';
            }
        }

        async function startProcessing() {
            const fileInput = document.getElementById('photoInput');
            const faceFix = document.getElementById('faceEnhance').checked;
            
            if (fileInput.files.length === 0) return alert('Pilih foto dulu.');
            
            abortController = new AbortController();
            
            toggleUI(true);

            const formData = new FormData();
            for (let i = 0; i < fileInput.files.length; i++) {
                formData.append('photos', fileInput.files[i]);
            }
            formData.append('faceEnhance', faceFix);

            try {
                const response = await fetch('/process', {
                    method: 'POST',
                    body: formData,
                    signal: abortController.signal
                });

                const data = await response.json();
                if (data.success) {
                    document.getElementById('viewAfter').src = data.previewUrl;
                    document.getElementById('downloadLink').href = data.downloadUrl;
                    document.getElementById('resultSection').style.display = 'block';
                }
            } catch (err) {
                if (err.name === 'AbortError') alert('Proses dibatalkan.');
            } finally {
                toggleUI(false);
            }
        }

        function cancelProcessing() {
            if (abortController) abortController.abort();
        }

        function toggleUI(processing) {
            document.getElementById('btnProcess').style.display = processing ? 'none' : 'block';
            document.getElementById('btnCancel').style.display = processing ? 'block' : 'none';
            document.getElementById('loadingSection').style.display = processing ? 'block' : 'none';
        }

        function handleSlider(e) {
            const rect = document.getElementById('comparisonView').getBoundingClientRect();
            const x = (e.pageX || e.touches[0].pageX) - rect.left;
            const percent = Math.max(0, Math.min(100, (x / rect.width) * 100));
            document.getElementById('viewAfter').style.clipPath = `inset(0 0 0 ${percent}%)`;
            document.getElementById('sliderLine').style.left = `${percent}%`;
        }
    </script>
</body>
</html>
