<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Photo Upscaler 32MP - Super Jernih</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #059669;
            --bg: #f8fafc;
        }
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            text-align: center; 
            padding: 20px; 
            background-color: var(--bg);
            color: #1e293b;
        }
        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 16px; 
            display: inline-block; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            max-width: 500px;
            width: 100%;
        }
        h2 { margin-top: 0; color: var(--primary); }
        .info { font-size: 0.9rem; color: #64748b; margin-bottom: 20px; }
        
        input[type="file"] {
            margin: 20px 0;
            padding: 10px;
            border: 2px dashed #cbd5e1;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }
        .btn:hover { background-color: #1d4ed8; }
        .btn:disabled { background-color: #cbd5e1; cursor: not-allowed; }

        .loading-section { display: none; margin-top: 25px; }
        .spinner {
            border: 4px solid rgba(0,0,0,0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: var(--primary);
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #status { font-weight: 500; color: #475569; margin-bottom: 5px; }
        #sub-status { font-size: 0.85rem; color: #94a3b8; }

        #result-section { display: none; margin-top: 30px; padding-top: 20px; border-top: 1px solid #e2e8f0; }
        .download-btn {
            background-color: var(--success);
            text-decoration: none;
            display: inline-block;
        }
        .download-btn:hover { background-color: #047857; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Upscaler 32MP</h2>
        <p class="info">Denoise + Lanczos3 + Sharpening<br>Maksimal 3 foto (Max 25MB/foto)</p>
        
        <input type="file" id="photoInput" accept="image/*" multiple>
        
        <button id="btnProcess" class="btn" onclick="startProcessing()">Jernihkan Sekarang</button>

        <div id="loadingSection" class="loading-section">
            <div class="spinner"></div>
            <div id="status">Memulai antrean...</div>
            <div id="sub-status">Proses 32MP memakan waktu 1-2 menit per foto. Mohon jangan tutup halaman ini.</div>
        </div>

        <div id="resultSection" class="result-section">
            <p style="color: var(--success); font-weight: bold;">✓ Foto Berhasil Dijernihkan!</p>
            <a id="downloadLink" href="#" class="btn download-btn">DOWNLOAD HASIL (.ZIP)</a>
        </div>
    </div>

    <script>
        async function startProcessing() {
            const fileInput = document.getElementById('photoInput');
            const btn = document.getElementById('btnProcess');
            const loadingSection = document.getElementById('loadingSection');
            const resultSection = document.getElementById('resultSection');
            const statusText = document.getElementById('status');
            const downloadLink = document.getElementById('downloadLink');

            if (fileInput.files.length === 0) {
                alert('Silakan pilih foto terlebih dahulu.');
                return;
            }

            if (fileInput.files.length > 3) {
                alert('Maksimal 3 foto saja agar server tetap stabil.');
                return;
            }

            const formData = new FormData();
            for (let i = 0; i < fileInput.files.length; i++) {
                formData.append('photos', fileInput.files[i]);
            }

            // UI Reset & Start
            btn.disabled = true;
            loadingSection.style.display = 'block';
            resultSection.style.display = 'none';
            statusText.innerText = `Memproses 0/${fileInput.files.length} foto...`;

            try {
                // Mengirim data ke backend Railway
                const response = await fetch('/process', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('Gagal memproses di server.');

                const data = await response.json();

                if (data.success) {
                    loadingSection.style.display = 'none';
                    resultSection.style.display = 'block';
                    downloadLink.href = data.downloadUrl;
                } else {
                    alert('Gagal: ' + data.message);
                    resetUI();
                }

            } catch (error) {
                console.error(error);
                alert('Terjadi kesalahan koneksi atau server sibuk.');
                resetUI();
            }
        }

        function resetUI() {
            document.getElementById('btnProcess').disabled = false;
            document.getElementById('loadingSection').style.display = 'none';
        }
    </script>
</body>
  </html>
